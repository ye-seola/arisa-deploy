openapi: 3.1.0
info:
  title: Arisa API
  version: 0.1.0
servers:
  - url: http://localhost:3000
paths:
  /:
    get:
      summary: API test page
      responses:
        "200":
          description: HTML test page
          content:
            text/html:
              schema:
                type: string
  /api/ws:
    get:
      summary: WebSocket chat event stream
      description: Upgrades to a WebSocket. Messages are JSON ChatEvent or FeedEvent payloads with an outer `type`.
      responses:
        "101":
          description: WebSocket upgrade
  /api/v1/reply:
    post:
      summary: Send a text reply
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ReplyRequest"
      responses:
        "200":
          description: Enqueue result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OkResponse"
  /api/v1/enter_chatroom:
    post:
      summary: Enter a chat room
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/EnterChatroomRequest"
      responses:
        "200":
          description: Enqueue result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OkResponse"
  /api/v1/reply_media:
    post:
      summary: Send media reply
      parameters:
        - $ref: "#/components/parameters/ChatIdU64"
        - name: mode
          in: query
          schema:
            type: string
            default: single
            enum: [single, multiple]
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                file:
                  type: array
                  description: Each file part may include its own filename and Content-Type. Missing Content-Type defaults to `application/octet-stream`.
                  items:
                    type: string
                    format: binary
              required: [file]
      responses:
        "200":
          description: Upload result
          content:
            application/json:
              schema:
                oneOf:
                  - type: object
                    properties:
                      ok:
                        const: true
                      files:
                        type: array
                        items:
                          type: object
                          properties:
                            mime:
                              type: string
                            name:
                              type:
                                - string
                                - "null"
                            path:
                              type: string
                          required: [mime, name, path]
                    required: [ok, files]
                  - $ref: "#/components/schemas/ErrorResponse"
  /api/v1/get_user:
    get:
      summary: Get a user/member in a chat context
      parameters:
        - $ref: "#/components/parameters/ChatId"
        - name: user_id
          in: query
          required: true
          schema:
            type: string
      responses:
        "200":
          description: User lookup result
          content:
            application/json:
              schema:
                oneOf:
                  - type: object
                    properties:
                      ok:
                        const: true
                      member:
                        $ref: "#/components/schemas/TalkMember"
                    required: [ok, member]
                  - $ref: "#/components/schemas/ErrorResponse"
  /api/v1/get_chat:
    get:
      summary: Get chat room metadata
      parameters:
        - $ref: "#/components/parameters/ChatId"
      responses:
        "200":
          description: Chat room lookup result
          content:
            application/json:
              schema:
                oneOf:
                  - type: object
                    properties:
                      ok:
                        const: true
                      chat:
                        $ref: "#/components/schemas/ChatRoom"
                    required: [ok, chat]
                  - $ref: "#/components/schemas/ErrorResponse"
  /api/v1/get_chat_members:
    get:
      summary: Get active member ids for a chat room
      parameters:
        - $ref: "#/components/parameters/ChatId"
      responses:
        "200":
          description: Active chat members
          content:
            application/json:
              schema:
                oneOf:
                  - type: object
                    properties:
                      ok:
                        const: true
                      members:
                        $ref: "#/components/schemas/ChatMembers"
                    required: [ok, members]
                  - $ref: "#/components/schemas/ErrorResponse"
  /api/v1/raw_query:
    post:
      summary: Run a read-only raw SQL query
      description: Allows SELECT, WITH, and PRAGMA queries only. Integer values are returned as strings.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RawQueryRequest"
      responses:
        "200":
          description: Query result
          content:
            application/json:
              schema:
                oneOf:
                  - type: object
                    properties:
                      ok:
                        const: true
                      rows:
                        type: array
                        items:
                          type: object
                          additionalProperties: true
                    required: [ok, rows]
                  - $ref: "#/components/schemas/ErrorResponse"
  /api/v1/decrypt:
    post:
      summary: Decrypt Kakao encrypted text
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DecryptRequest"
      responses:
        "200":
          description: Decryption result
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    const: true
                  plaintext:
                    type: string
                required: [ok, plaintext]
components:
  parameters:
    ChatId:
      name: chat_id
      in: query
      required: true
      schema:
        type: string
    ChatIdU64:
      name: chat_id
      in: query
      required: true
      schema:
        type: string
  schemas:
    OkResponse:
      type: object
      properties:
        ok:
          const: true
      required: [ok]
    ErrorResponse:
      type: object
      properties:
        ok:
          const: false
        error:
          type: string
      required: [ok, error]
    ReplyRequest:
      type: object
      properties:
        chat_id:
          type: string
        message:
          type: string
        thread_id:
          type: [string, "null"]
      required: [chat_id, message]
    EnterChatroomRequest:
      type: object
      properties:
        chat_id:
          type: string
      required: [chat_id]
    RawQueryRequest:
      type: object
      properties:
        sql:
          type: string
          examples:
            - SELECT * FROM db1.chat_rooms LIMIT 10
        limit:
          type: integer
          minimum: 1
          maximum: 5000
          default: 500
      required: [sql]
    DecryptRequest:
      type: object
      properties:
        ciphertext:
          type: string
        enc:
          type: integer
          minimum: 0
          default: 0
        uid:
          type: [integer, "null"]
          format: int64
      required: [ciphertext]
    ChatMembers:
      type: object
      properties:
        chat_id:
          type: string
        active_member_ids:
          type: array
          items:
            type: string
      required: [chat_id, active_member_ids]
    ChatRoom:
      type: object
      properties:
        id:
          type: string
        type:
          type: string
        name:
          type: [string, "null"]
        private_name:
          type: [string, "null"]
      required: [id, type, name, private_name]
    Member:
      type: object
      properties:
        type:
          const: Member
        id:
          type: string
        is_mine:
          type: boolean
        nickname:
          type: string
        profile_image_url:
          type: [string, "null"]
      required: [type, id, is_mine, nickname, profile_image_url]
    OpenChatMember:
      type: object
      properties:
        type:
          const: OpenMember
        id:
          type: string
        profile_type:
          type: string
          enum: [DEFAULT, KAKAO, OPEN, UNKNOWN]
        link_member_type:
          type: string
          enum: [HOST, MEMBER, MODERATOR, UNKNOWN]
        is_mine:
          type: boolean
        nickname:
          type: string
        profile_image_url:
          type: [string, "null"]
        profile_link_id:
          type: string
      required:
        - type
        - id
        - profile_type
        - link_member_type
        - is_mine
        - nickname
        - profile_image_url
        - profile_link_id
    TalkMember:
      oneOf:
        - $ref: "#/components/schemas/Member"
        - $ref: "#/components/schemas/OpenChatMember"
      discriminator:
        propertyName: type
    ChatEvent:
      type: object
      properties:
        type:
          const: chat
        message_type:
          type: integer
        room:
          $ref: "#/components/schemas/ChatRoom"
        author:
          $ref: "#/components/schemas/TalkMember"
        message:
          type: string
        attachment:
          type: object
          additionalProperties: true
      required: [type, message_type, room, author, message, attachment]
    FeedEvent:
      type: object
      properties:
        type:
          const: feed
        room:
          $ref: "#/components/schemas/ChatRoom"
        feed:
          $ref: "#/components/schemas/FeedPayload"
      required: [type, room, feed]
    FeedUser:
      type: object
      properties:
        id:
          type: string
        nickname:
          type: string
      required: [id, nickname]
    FeedPayload:
      oneOf:
        - type: object
          properties:
            type:
              const: user_join
            joined_users:
              type: array
              items:
                $ref: "#/components/schemas/FeedUser"
          required: [type, joined_users]
        - type: object
          properties:
            type:
              const: user_left
            left_member:
              $ref: "#/components/schemas/FeedUser"
          required: [type, left_member]
        - type: object
          properties:
            type:
              const: user_kicked
            kicked_user:
              $ref: "#/components/schemas/FeedUser"
            kicked_by:
              $ref: "#/components/schemas/TalkMember"
          required: [type, kicked_user, kicked_by]
        - type: object
          properties:
            type:
              const: message_deleted
            log_id:
              type: string
          required: [type, log_id]
        - type: object
          properties:
            type:
              const: message_changed
            log_id:
              type: string
            target_revision:
              type: integer
          required: [type, log_id, target_revision]
        - type: object
          properties:
            type:
              const: message_hidden
            log_ids:
              type: array
              items:
                type: string
          required: [type, log_ids]
        - type: object
          properties:
            type:
              const: unknown
            raw: true
          required: [type, raw]
